<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四角に切れ (Shikaku) - Your Logic</title>
    <link rel="stylesheet" href="../css/shikaku.css">
</head>
<body>

    <div class="container">
        <header>
            <a href="../index.html" class="back-link">← ホームへ戻る</a>
            <h2>Your Logic - 四角に切れ</h2>
        </header>

        <div class="auth-bar">
            <div id="game-meta-text">サイズ: -- / 難易度: --</div>
            
            <div class="timer-area">⏱️ 経過時間: <span id="timer">00:00</span></div>
        </div>

        <div class="input-mode-selector">
            <button id="mode-draw-btn" class="mode-btn active">本番 (枠線)</button>
            <button id="mode-draft-btn" class="mode-btn">下書き (色塗)</button>
            <button id="mode-erase-btn" class="mode-btn">消しゴム</button>
        </div>

        <div class="shikaku-board" id="board"></div>

        <div id="hint-text-area" style="margin-top: 15px; padding: 10px; border-radius: 5px; min-height: 40px; font-weight: bold; text-align: center; background-color: #f0f0f0; color: #333; display: none;"></div>

        <div class="controls">
            <button class="action-btn" id="check-btn">答え合わせ</button>
            <button class="action-btn" id="hint-btn">ヒント</button>
            <button class="action-btn" id="giveup-btn">諦める</button>
        </div>
    </div>

    <script type="module" src="../js/puzzles/shikaku/shikaku.js"></script>
</body>
</html>
