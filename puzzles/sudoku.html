<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独 (Sudoku) - Your Logic</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --accent-color: #3182ce;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-thin: #cbd5e0;
            --border-thick: #1a365d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .back-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .auth-bar {
            background-color: #edf2f7;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .login-btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn {
            background: none;
            border: 1px solid var(--text-color);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .diff-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-thin);
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-align: center;
        }

        .diff-btn:hover { border-color: var(--accent-color); background-color: #ebf8ff; }
        .diff-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: var(--border-thick);
            border: 3px solid var(--border-thick);
            aspect-ratio: 1 / 1;
            width: 100%;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cell {
            background-color: var(--card-bg);
            border: 1px solid var(--border-thin);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(1.5rem + 1vw);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .cell:nth-child(3n) { border-right: 2px solid var(--border-thick); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid var(--border-thick);
        }

        .cell.selected { background-color: #bee3f8; }
        .cell.initial { color: #1a365d; background-color: #f7fafc; }
        .cell.user-filled { color: #2b6cb0; }

        .num-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .num-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .num-btn.clear-btn { background-color: #e53e3e; }

        .controls { display: flex; justify-content: space-between; gap: 1rem; }
        .action-btn { flex: 1; padding: 0.75rem; border: 1px solid var(--border-thin); background-color: var(--card-bg); border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="../index.html" class="back-link">← ホームへ戻る</a>
            <h2>Your Logic - 数独</h2>
        </header>

        <div class="auth-bar">
            <div id="auth-status-text">ユーザー状態を確認中...</div>
            <button id="login-btn" class="login-btn" style="display: none;">Googleログイン</button>
            <button id="logout-btn" class="logout-btn" style="display: none;">ログアウト</button>
        </div>

        <div class="difficulty-selector">
            <div class="diff-btn active" data-diff="easy">1, So Easy</div>
            <div class="diff-btn" data-diff="standard">2, Standard</div>
            <div class="diff-btn" data-diff="hard">3, Hard</div>
            <div class="diff-btn" data-diff="insane">4, Insane</div>
        </div>

        <div class="sudoku-board" id="board"></div>

        <div class="num-pad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn clear-btn" data-num="">消</button>
        </div>

        <div class="controls">
            <button class="action-btn" id="check-btn">答え合わせ</button>
            <button class="action-btn" id="hint-btn">ヒント</button>
        </div>
    </div>

    <script type="module" src="../js/puzzles/sudoku.js"></script>
</body>
</html>
