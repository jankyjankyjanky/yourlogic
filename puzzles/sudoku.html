<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独 (Sudoku) - 4段階難易度</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --accent-color: #3182ce;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-thin: #cbd5e0;
            --border-thick: #1a365d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 1rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ヘッダー・戻るボタン */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        /* 難易度セレクター */
        .difficulty-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        @media (min-width: 480px) {
            .difficulty-selector {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .diff-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-thin);
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-align: center;
        }

        .diff-btn:hover {
            border-color: var(--accent-color);
            background-color: #ebf8ff;
        }

        .diff-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 数独盤面（9x9） */
        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            background-color: var(--border-thick);
            border: 3px solid var(--border-thick);
            aspect-ratio: 1 / 1;
            width: 100%;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .cell {
            background-color: var(--card-bg);
            border: 1px solid var(--border-thin);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(1.5rem + 1vw);
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        /* 3x3の太線区切りをCSSで表現 */
        .cell:nth-child(3n) { border-right: 2px solid var(--border-thick); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid var(--border-thick);
        }

        /* セル選択時・初期数字のスタイル */
        .cell.selected { background-color: #bee3f8; }
        .cell.initial { color: #1a365d; background-color: #f7fafc; }
        .cell.user-filled { color: #2b6cb0; }

        /* ナンバーパッド（入力用ボタン） */
        .num-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .num-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 0;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.1s;
        }

        .num-btn:hover { background-color: #2b4365; }
        .num-btn.clear-btn { background-color: #e53e3e; grid-column: span 1; }
        .num-btn.clear-btn:hover { background-color: #c53030; }

        /* コントロール */
        .controls {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }
        .action-btn {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border-thin);
            background-color: var(--card-bg);
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .action-btn:hover { background-color: #edf2f7; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="index.html" class="back-link">← ホームへ戻る</a>
            <h2>数独 (Sudoku)</h2>
        </header>

        <div class="difficulty-selector">
            <div class="diff-btn active" onclick="selectDifficulty('easy', this)">1, So Easy</div>
            <div class="diff-btn" onclick="selectDifficulty('standard', this)">2, Standard</div>
            <div class="diff-btn" onclick="selectDifficulty('hard', this)">3, Hard</div>
            <div class="diff-btn" onclick="selectDifficulty('insane', this)">4, Insane</div>
        </div>

        <div class="sudoku-board" id="board">
            </div>

        <div class="num-pad">
            <button class="num-btn" onclick="inputNumber(1)">1</button>
            <button class="num-btn" onclick="inputNumber(2)">2</button>
            <button class="num-btn" onclick="inputNumber(3)">3</button>
            <button class="num-btn" onclick="inputNumber(4)">4</button>
            <button class="num-btn" onclick="inputNumber(5)">5</button>
            <button class="num-btn" onclick="inputNumber(6)">6</button>
            <button class="num-btn" onclick="inputNumber(7)">7</button>
            <button class="num-btn" onclick="inputNumber(8)">8</button>
            <button class="num-btn" onclick="inputNumber(9)">9</button>
            <button class="num-btn clear-btn" onclick="inputNumber('')">消</button>
        </div>

        <div class="controls">
            <button class="action-btn" onclick="checkAnswer()">答え合わせ</button>
            <button class="action-btn" onclick="getHint()">ヒント</button>
        </div>
    </div>

    <script>
        let selectedCell = null;
        let currentDifficulty = 'easy';

        // 盤面の初期化（81マス生成）
        const boardElement = document.getElementById('board');
        for (let i = 0; i < 81; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            cell.dataset.index = i;
            
            // 仮の初期配置テスト（後ほど生成ロジックと連動）
            if (Math.random() > 0.6) {
                cell.innerText = Math.floor(Math.random() * 9) + 1;
                cell.classList.add('initial');
            }

            cell.addEventListener('click', function() {
                if (cell.classList.contains('initial')) return; // 初期数字は選択・変更不可
                if (selectedCell) selectedCell.classList.remove('selected');
                selectedCell = cell;
                cell.classList.add('selected');
            });
            boardElement.appendChild(cell);
        }

        // 難易度切り替えのモック
        function selectDifficulty(diff, element) {
            currentDifficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            alert(`難易度「${element.innerText}」の新問題を作成します（生成ロジックはここへ結合）`);
        }

        // 数字入力処理
        function inputNumber(num) {
            if (!selectedCell) return;
            selectedCell.innerText = num;
            if (num === '') {
                selectedCell.classList.remove('user-filled');
            } else {
                selectedCell.classList.add('user-filled');
            }
        }

        function checkAnswer() { alert("答え合わせ処理（未実装）"); }
        function getHint() { alert("ヒント処理（未実装）"); }
    </script>
</body>
</html>
