<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独 (Sudoku) - Your Logic</title>
    <link rel="stylesheet" href="../css/sudoku.css">
</head>
<body>

    <div class="container">
        <header>
            <a href="../index.html" class="back-link">← ホームへ戻る</a>
            <h2>Your Logic -数独</h2>
        </header>

        <div class="auth-bar">
            <div id="auth-status-text">ユーザー状態を確認中...</div>
            <button id="login-btn" class="login-btn" style="display: none;">Googleログイン</button>
            <button id="logout-btn" class="logout-btn" style="display: none;">ログアウト</button>
        </div>

        <div class="difficulty-selector">
            <div class="diff-btn active" data-diff="easy">1, So Easy</div>
            <div class="diff-btn" data-diff="standard">2, Standard</div>
            <div class="diff-btn" data-diff="hard">3, Hard</div>
            <div class="diff-btn" data-diff="insane">4, Insane</div>
        </div>

        <div class="input-mode-selector">
            <button id="mode-location-btn" class="mode-btn active">ロケーションプレイス</button>
            <button id="mode-auto-btn" class="mode-btn">オートプレイス</button>
        </div>

        <div class="sudoku-board" id="board"></div>

        <div class="num-pad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn clear-btn" data-num="">消</button>
        </div>

        <div class="controls">
            <button id="memo-btn" class="action-btn control-btn">仮置きモード: OFF</button>
            <button class="action-btn" id="check-btn">答え合わせ</button>
            <button class="action-btn" id="hint-btn">ヒント</button>
        </div>
    </div>

    <script type="module" src="../js/puzzles/sudoku.js"></script>
</body>
</html>
